name: Deploy

on:
  push:
    tags:
      - "v*.*"
      - "v*.*.*"

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/squidgame100-minecraft

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/docker/client.Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-client:${{ github.ref_name }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/docker/server.Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-server:${{ github.ref_name }}

      - name: SSH deploy to VPS
        if: ${{ secrets.VPS_HOST != '' }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd "${{ secrets.VPS_APP_DIR }}"
            git fetch --tags origin
            git checkout "${{ github.ref_name }}"
            docker compose pull
            docker compose up -d --build
