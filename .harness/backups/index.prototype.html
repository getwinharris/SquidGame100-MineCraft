<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="SquidGame100 MineCraft — Squid Game Island in Minecraft voxel blocks." />
    <meta name="theme-color" content="#0b1f3a" />
    <title>SquidGame100 MineCraft</title>
    <style>
      :root {
        --sg-pink:  #ff2d6f;
        --sg-green: #00a86b;
        --sg-ink:   #0b1f3a;
        --sg-gold:  #ffd700;
        --sg-white: #ffffff;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; background: var(--sg-ink); overflow: hidden; }
      #app { width: 100vw; height: 100vh; position: relative; }
      #scene { width: 100%; height: 100%; display: block; }

      /* ── Phase flash overlay ── */
      #phase-overlay {
        position: fixed; inset: 0;
        pointer-events: none;
        transition: background 0.1s;
        z-index: 1;
      }

      /* ── HUD ── */
      #hud {
        position: fixed; inset: 0;
        pointer-events: none;
        font-family: 'Courier New', Courier, monospace;
        z-index: 10;
      }

      /* Game status panel */
      #game-hud {
        position: absolute; top: 14px; left: 50%;
        transform: translateX(-50%);
        background: rgba(11,31,58,0.82);
        border: 2px solid var(--sg-pink);
        border-radius: 8px;
        padding: 10px 22px;
        font-size: 15px; line-height: 1.7;
        text-align: center;
        color: #fff;
        text-shadow: 0 1px 4px rgba(0,0,0,0.9);
        min-width: 300px;
        max-width: 480px;
      }
      #game-hud .pink  { color: var(--sg-pink); }
      #game-hud .green { color: var(--sg-green); }
      #game-hud .gold  { color: var(--sg-gold); }
      #game-hud .white { color: #fff; }

      /* Network status */
      #status {
        position: absolute; top: 14px; right: 14px;
        background: rgba(11,31,58,0.7);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 6px;
        padding: 6px 12px;
        font-size: 12px; color: #aaa;
      }
      #status .ok  { color: var(--sg-green); }
      #status .err { color: var(--sg-pink); }

      /* Controls legend */
      #controls {
        position: absolute; bottom: 14px; left: 14px;
        background: rgba(11,31,58,0.7);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 6px;
        padding: 8px 14px;
        font-size: 12px; color: #ccc; line-height: 1.8;
      }
      #controls kbd {
        display: inline-block;
        background: rgba(255,255,255,0.15);
        border: 1px solid rgba(255,255,255,0.3);
        border-radius: 3px;
        padding: 1px 5px;
        font-size: 11px;
        color: #fff;
      }

      /* Health bar */
      #health-bar-wrap {
        position: absolute; bottom: 14px; right: 14px;
        background: rgba(11,31,58,0.8);
        border: 1px solid var(--sg-pink);
        border-radius: 6px; padding: 8px 14px; min-width: 160px;
      }
      #health-bar-wrap label { font-size: 11px; color: #aaa; display: block; margin-bottom: 4px; }
      #health-bar {
        height: 8px; background: #1a2a3a; border-radius: 4px; overflow: hidden;
      }
      #health-fill {
        height: 100%; width: 100%;
        background: linear-gradient(90deg, var(--sg-green), #00ff88);
        border-radius: 4px;
        transition: width 0.3s, background 0.3s;
      }

      /* Crosshair */
      #crosshair {
        position: absolute; top: 50%; left: 50%;
        transform: translate(-50%,-50%);
        width: 20px; height: 20px;
        display: none; /* shown after pointer lock */
        pointer-events: none;
      }
      #crosshair::before, #crosshair::after {
        content: ''; position: absolute; background: rgba(255,255,255,0.85);
      }
      #crosshair::before { left:50%; top:0; width:2px; height:100%; transform:translateX(-50%); }
      #crosshair::after  { top:50%; left:0; width:100%; height:2px; transform:translateY(-50%); }

      /* Click to play overlay */
      #click-to-play {
        position: absolute; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: rgba(11,31,58,0.88);
        cursor: pointer; z-index: 20;
        transition: opacity 0.4s;
      }
      #click-to-play h1 {
        font-size: clamp(28px,6vw,64px);
        color: #fff; letter-spacing: 3px; margin-bottom: 12px;
      }
      #click-to-play h1 .accent { color: var(--sg-pink); }
      #click-to-play p {
        color: #ccc; font-size: 15px; margin-bottom: 6px;
      }
      #click-to-play .hint {
        margin-top: 18px;
        color: var(--sg-gold);
        font-size: 18px;
        animation: pulse 1.5s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,100% { opacity: 1; }
        50%      { opacity: 0.4; }
      }

      /* Squid game symbols */
      .sg-symbols {
        display: flex; gap: 20px; margin: 16px 0;
        font-size: 36px;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="scene"></canvas>
    </div>

    <!-- Phase color overlay -->
    <div id="phase-overlay"></div>

    <!-- HUD -->
    <div id="hud">
      <div id="game-hud">Loading Squid Game Island…</div>
      <div id="status">connecting…</div>
      <div id="crosshair"></div>
      <div id="controls">
        <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> Move &nbsp;
        <kbd>SPACE</kbd> Jump &nbsp;
        <kbd>SHIFT</kbd> Sprint<br>
        <kbd>Mouse</kbd> Look &nbsp;
        <kbd>R</kbd> Respawn after elimination
      </div>
      <div id="health-bar-wrap">
        <label>HEALTH</label>
        <div id="health-bar"><div id="health-fill"></div></div>
      </div>
    </div>

    <!-- Click to play screen -->
    <div id="click-to-play">
      <h1>Squid<span class="accent">Game</span>100<br><span class="accent">Mine</span>Craft</h1>
      <div class="sg-symbols">▲ ○ △</div>
      <p>Squid Game Island — Minecraft Voxel Edition</p>
      <p style="color:#aaa; font-size:13px;">Red Light, Green Light · Glass Bridge · Prize Vault</p>
      <div class="hint">▶ CLICK TO PLAY</div>
    </div>

    <script type="module" src="/src/main.ts"></script>
    <script>
      // Hide click-to-play on first click, update health bar
      document.getElementById('click-to-play').addEventListener('click', function() {
        this.style.opacity = '0';
        setTimeout(() => this.remove(), 500);
      });
      // Health bar updater
      setInterval(() => {
        const fill = document.getElementById('health-fill');
        if (!fill) return;
        try {
          const state = JSON.parse(window.render_game_to_text?.() ?? '{}');
          const hp = Math.max(0, Math.min(100, state.health ?? 100));
          fill.style.width = hp + '%';
          fill.style.background = hp > 50
            ? 'linear-gradient(90deg,#00a86b,#00ff88)'
            : hp > 25
            ? 'linear-gradient(90deg,#ff8800,#ffcc00)'
            : 'linear-gradient(90deg,#cc1a50,#ff2d6f)';
        } catch {}
      }, 200);
    </script>
  </body>
</html>
