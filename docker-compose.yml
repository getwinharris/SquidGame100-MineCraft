services:
  client:
    build:
      context: .
      dockerfile: packages/docker/client.Dockerfile
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: packages/docker/server.Dockerfile
    environment:
      HOST: 0.0.0.0
      PORT: 8080
    ports:
      - "8081:8080"
    restart: unless-stopped

  caddy:
    image: caddy:2.8-alpine
    depends_on:
      - client
      - server
    ports:
      - "8080:8080"
    volumes:
      - ./packages/docker/Caddyfile:/etc/caddy/Caddyfile:ro
    restart: unless-stopped
